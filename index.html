<!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech News</title>

<style>
body{
font-family: Arial;
padding:20px;
}

button{
margin:5px;
padding:8px 12px;
cursor:pointer;
}

.card{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
border-radius:5px;
}
</style>

</head>

<body>

<h1>Tech News</h1>

<p>
<button class="topic" data-topic="AI">AI</button>
<button class="topic" data-topic="javascript">JavaScript</button>
<button class="topic" data-topic="startup">Startup</button>
<button class="topic" data-topic="programming">Programming</button>
</p>

<hr>

<div id="news"></div>

<script>

const newsContainer = document.getElementById("news");
const buttons = document.querySelectorAll(".topic");


buttons.forEach(btn=>{
btn.addEventListener("click", () => {

const topic = btn.dataset.topic;
fetchNews(topic);

});
});


async function fetchNews(topic){

try{

newsContainer.innerHTML = "Loading...";

const url = `https://hn.algolia.com/api/v1/search?query=${topic}`;

const res = await fetch(url);

const data = await res.json();

showNews(data.hits);

}
catch(err){

newsContainer.innerHTML = "Error loading news";

}

}


function showNews(articles){

newsContainer.innerHTML = "";

articles.forEach(article=>{

const title = article.title || "No Title";

const link = article.url || "#";

const div = document.createElement("div");

div.className = "card";

div.innerHTML = `
<h3>${title}</h3>
<a href="${link}" target="_blank">Read More</a>
`;

newsContainer.appendChild(div);

});

}

</script>

</body>
</html>
